<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 400px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }
    
    .container {
      padding: 20px;
    }
    
    .header {
      color: white;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 20px;
      margin-bottom: 5px;
    }
    
    .header p {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .input-section {
      background: white;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 15px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .input-section label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #667eea;
      margin-bottom: 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    
    .input-group {
      display: flex;
      gap: 8px;
    }
    
    #urlInput {
      flex: 1;
      padding: 10px;
      border: 2px solid #e0e0e0;
      border-radius: 6px;
      font-size: 12px;
      transition: border-color 0.3s;
    }
    
    #urlInput:focus {
      outline: none;
      border-color: #667eea;
    }
    
    #evalBtn {
      padding: 10px 16px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 6px;
      font-weight: 600;
      cursor: pointer;
      font-size: 12px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    
    #evalBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    #evalBtn:active {
      transform: translateY(0);
    }
    
    #evalBtn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .loading {
      display: none;
      text-align: center;
      color: white;
      margin: 20px 0;
    }
    
    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      border-top-color: white;
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .results {
      display: none;
      background: white;
      border-radius: 8px;
      padding: 15px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }
    
    .results.show {
      display: block;
    }
    
    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 15px;
      border-bottom: 2px solid #f0f0f0;
      padding-bottom: 12px;
    }
    
    .result-header h2 {
      font-size: 14px;
      color: #333;
    }
    
    .overall-score {
      font-size: 20px;
      font-weight: bold;
      color: #667eea;
    }
    
    .score-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #f5f5f5;
    }
    
    .score-item:last-child {
      border-bottom: none;
    }
    
    .score-label {
      font-size: 12px;
      font-weight: 500;
      color: #555;
    }
    
    .score-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex: 1;
      margin-left: 10px;
    }
    
    .progress-bar {
      width: 80px;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
      border-radius: 3px;
      transition: width 0.3s ease;
    }
    
    .score-value {
      font-size: 12px;
      font-weight: 600;
      color: #667eea;
      min-width: 30px;
      text-align: right;
    }
    
    .analysis-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid #f0f0f0;
    }
    
    .analysis-title {
      font-size: 11px;
      font-weight: 700;
      color: #667eea;
      text-transform: uppercase;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }
    
    .analysis-text {
      font-size: 11px;
      line-height: 1.5;
      color: #666;
    }
    
    .error {
      display: none;
      background: #fee;
      color: #c33;
      padding: 12px;
      border-radius: 6px;
      border-left: 4px solid #c33;
      font-size: 12px;
      margin-bottom: 15px;
    }
    
    .error.show {
      display: block;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔍 Website Evaluator</h1>
      <p>웹사이트를 분석하고 평가합니다</p>
    </div>
    
    <div class="error" id="errorMsg"></div>
    
    <div class="input-section">
      <label for="urlInput">웹사이트 URL</label>
      <div class="input-group">
        <input 
          type="url" 
          id="urlInput" 
          placeholder="https://example.com"
          value="https://example.com"
        >
        <button id="evalBtn">평가</button>
      </div>
    </div>
    
    <div class="loading" id="loading">
      <div class="spinner"></div>
      <p style="margin-top: 10px; font-size: 12px;">평가 중...</p>
    </div>
    
    <div class="results" id="results">
      <div class="result-header">
        <h2>평가 결과</h2>
        <div class="overall-score" id="overallScore">0/10</div>
      </div>
      
      <div class="score-item">
        <span class="score-label">시각적 매력도</span>
        <div class="score-bar">
          <div class="progress-bar">
            <div class="progress-fill" id="visualFill" style="width: 0%"></div>
          </div>
          <span class="score-value" id="visualScore">0</span>
        </div>
      </div>
      
      <div class="score-item">
        <span class="score-label">사용자 체류도</span>
        <div class="score-bar">
          <div class="progress-bar">
            <div class="progress-fill" id="retentionFill" style="width: 0%"></div>
          </div>
          <span class="score-value" id="retentionScore">0</span>
        </div>
      </div>
      
      <div class="score-item">
        <span class="score-label">모바일 반응성</span>
        <div class="score-bar">
          <div class="progress-bar">
            <div class="progress-fill" id="mobileFill" style="width: 0%"></div>
          </div>
          <span class="score-value" id="mobileScore">0</span>
        </div>
      </div>
      
      <div class="score-item">
        <span class="score-label">로딩 속도</span>
        <div class="score-bar">
          <div class="progress-bar">
            <div class="progress-fill" id="speedFill" style="width: 0%"></div>
          </div>
          <span class="score-value" id="speedScore">0</span>
        </div>
      </div>
      
      <div class="score-item">
        <span class="score-label">신뢰도</span>
        <div class="score-bar">
          <div class="progress-bar">
            <div class="progress-fill" id="trustFill" style="width: 0%"></div>
          </div>
          <span class="score-value" id="trustScore">0</span>
        </div>
      </div>
      
      <div class="analysis-section">
        <div class="analysis-title">📊 상세 분석</div>
        <div class="analysis-text" id="analysisText"></div>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
